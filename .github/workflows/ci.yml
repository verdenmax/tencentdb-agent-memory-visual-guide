name: Visual Guide CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Build and validate static guide
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build lesson pages
        run: python3 src/build.py

      - name: Build print pages
        run: python3 src/build_print.py

      - name: Check generated HTML structure
        run: python3 src/check_html.py

      - name: Check internal links
        run: python3 src/check_links.py

      - name: Check guide invariants
        run: |
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path

          root = Path.cwd()
          src = root / "src"
          sys.path.insert(0, str(src))
          import shell
          import registry
          import quizzes

          expected = 34
          pages = [page[0] for page in shell.PAGES]
          content = set(registry.CONTENT)
          quiz_keys = set(quizzes.QUIZZES)
          lesson_files = sorted(path.name for path in (root / "lessons").glob("*.html"))

          failures = []
          if len(pages) != expected:
              failures.append(f"shell.PAGES has {len(pages)} lessons, expected {expected}")
          if len(content) != expected:
              failures.append(f"registry.CONTENT has {len(content)} lessons, expected {expected}")
          if len(quiz_keys) != expected:
              failures.append(f"quizzes.QUIZZES has {len(quiz_keys)} lessons, expected {expected}")
          if pages != lesson_files:
              failures.append("lessons/*.html does not match shell.PAGES order and names")
          if set(pages) != content:
              failures.append("registry.CONTENT keys do not match shell.PAGES")
          if set(pages) != quiz_keys:
              failures.append("quizzes.QUIZZES keys do not match shell.PAGES")

          for name in ("index.html", "print_zh.html", "print_en.html"):
              if not (root / name).is_file():
                  failures.append(f"missing generated file: {name}")

          for name in ("print_zh.html", "print_en.html"):
              html = (root / name).read_text(encoding="utf-8")
              count = html.count('class="lesson-print"')
              if count != expected:
                  failures.append(f"{name} has {count} print lesson sections, expected {expected}")

          glossary_html = (root / "lessons" / "34-debug-tests-contribution-glossary.html").read_text(encoding="utf-8")
          required_glossary_links = {
              "L0": "13-l0-jsonl-recorder.html",
              "L1": "15-l1-extraction.html",
              "L2": "17-why-l2-scene-blocks.html",
              "L3 Persona": "20-persona-generator-incremental.html",
              "Scene Block": "17-why-l2-scene-blocks.html",
              "Auto Capture": "12-auto-capture-hook.html",
              "Auto Recall": "22-auto-recall-before-prompt.html",
              "TdaiCore": "09-tdai-core-facade.html",
              "HostAdapter": "10-host-adapter-boundaries.html",
              "Hermes Gateway": "32-hermes-gateway-http-security.html",
              "SQLite": "25-sqlite-vec-fts-bm25-hybrid.html",
              "Tencent VectorDB": "26-tencent-vectordb-embedding.html",
              "Context Offload": "27-why-long-task-logs-symbolic-compression.html",
              "refs": "28-after-tool-call-refs-offload-jsonl.html",
              "JSONL": "13-l0-jsonl-recorder.html",
              "MMD": "30-mermaid-mmd-node-id-drill-down.html",
              "node_id": "30-mermaid-mmd-node-id-drill-down.html",
              "seed": "33-seed-cli-migration-export-read.html",
              "migration": "33-seed-cli-migration-export-read.html",
              "glossary": "34-debug-tests-contribution-glossary.html",
          }
          glossary_row_pattern = re.compile(
              r'<tr><td class="mono">(?P<term>.*?)</td>.*?href="(?P<href>.*?)"',
              re.S,
          )
          glossary_rows = glossary_row_pattern.findall(glossary_html)
          glossary_term_counts = {}
          glossary_term_hrefs = {}
          for term, href in glossary_rows:
              glossary_term_counts[term] = glossary_term_counts.get(term, 0) + 1
              glossary_term_hrefs.setdefault(term, []).append(href)

          for term, lesson_target in required_glossary_links.items():
              term_count = glossary_term_counts.get(term, 0)
              if term_count != 2:
                  failures.append(
                      f"lesson 34 glossary term {term} appears {term_count} times, expected 2 (zh + en rows)"
                  )
              for href in glossary_term_hrefs.get(term, []):
                  if href != lesson_target:
                      failures.append(
                          f"lesson 34 glossary term {term} links to {href}, expected {lesson_target}"
                      )
              if not (root / "lessons" / lesson_target).is_file():
                  failures.append(f"lesson 34 glossary target does not exist for {term}: {lesson_target}")

          glossary_row_count = len(glossary_rows)
          if glossary_row_count != len(required_glossary_links) * 2:
              failures.append(
                  f"lesson 34 glossary has {glossary_row_count} bilingual term rows, "
                  f"expected {len(required_glossary_links) * 2}"
              )

          if failures:
              print("Guide invariant check failed:")
              for failure in failures:
                  print(f"- {failure}")
              raise SystemExit(1)
          print("Guide invariant check passed: 34 lessons, content, quizzes, lesson pages, and print pages align.")
          PY

      - name: Scan for release red flags
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path.cwd()
          skip_dirs = {".git", ".github", ".pytest_cache", "__pycache__"}
          # Internal development-process docs (implementation plans) intentionally
          # enumerate placeholder anti-patterns (TODO/TBD/FIXME) as guidance, so they
          # are not part of the shipped guide release and are excluded from this scan.
          skip_rel_prefixes = ("docs/superpowers/plans/",)
          scanned_ext = {".py", ".md", ".html", ".yml", ".yaml", ".txt"}
          bad_terms = ["TO" + "DO", "TB" + "D", "FIX" + "ME"]
          branding_terms = ["OpenClaw visual guide draft", "planned to build up"]
          secret_terms = ["BEGIN RSA PRIVATE KEY", "BEGIN OPENSSH PRIVATE KEY", "password=", "api_key=", "secret_key="]
          matches = []

          for path in root.rglob("*"):
              if not path.is_file():
                  continue
              if any(part in skip_dirs for part in path.parts):
                  continue
              rel = path.relative_to(root)
              if any(rel.as_posix().startswith(prefix) for prefix in skip_rel_prefixes):
                  continue
              if path.suffix not in scanned_ext and path.name not in {"LICENSE", "LICENSE-CONTENT"}:
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              for term in bad_terms + branding_terms + secret_terms:
                  if term in text:
                      matches.append(f"{rel}: {term}")

          if matches:
              print("Release red-flag scan found matches:")
              for match in matches:
                  print(f"- {match}")
              raise SystemExit(1)
          print("Release red-flag scan passed.")
          PY

      - name: Check generated-output drift
        run: |
          git diff --exit-code -- index.html lessons print_zh.html print_en.html
